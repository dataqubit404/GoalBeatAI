services:
  - type: web
    name: goalbeat-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_FOOTBALL_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: goalbeat_ai
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_STRICT
        value: "false"
      - key: DB_CA_CERT
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
